services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: real_estate_db
    environment:
      POSTGRES_DB: real_estate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: real_estate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Django Web Application with Gunicorn
  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: real_estate_web
    depends_on:
      - database
      - redis
    environment:
      - DJANGO_SETTINGS_MODULE=valuation_api.settings
      - DATABASE_URL=postgresql://postgres:postgres123@database:5432/real_estate_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - ML_SERVICE_URL=http://ml-service:8001
      - GUNICORN_WORKERS=3
      - SECRET_KEY=docker-dev-key-change-in-production
      - DEBUG=False
      - ALLOWED_HOSTS=localhost,127.0.0.1,web,0.0.0.0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app:cached
    user: "0:0"  # Run as root for development (volume permissions)
    # NOTE: gunicorn --reload for development convenience  
    # In real production, use entrypoint.sh with multiple workers and no --reload
    command: gunicorn --reload --workers 3 --bind 0.0.0.0:8000 --worker-class sync --worker-connections 1000 --timeout 30 --keep-alive 2 --log-level info --access-logfile - --error-logfile - valuation_api.wsgi:application
    restart: unless-stopped

  # Celery Worker for async tasks
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.celery
    container_name: real_estate_celery_worker
    depends_on:
      - redis
      - database
      - web
    environment:
      - DJANGO_SETTINGS_MODULE=valuation_api.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres123@database:5432/real_estate_db
      - ML_SERVICE_URL=http://ml-service:8001
      - SECRET_KEY=docker-dev-key-change-in-production
    volumes:
      - ./backend:/app:cached
    # NOTE: watchmedo auto-restart for development convenience
    # In real production, use: celery -A valuation_api worker --loglevel=info
    command: watchmedo auto-restart --directory=/app --pattern='*/tasks.py;*/celery.py;*/settings.py;*/models.py' --recursive -- celery -A valuation_api worker --loglevel=info
    restart: unless-stopped

  # Machine Learning Service
  ml-service:
    build:
      context: ./ml-service
    container_name: ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: always
    

volumes:
  postgres_data:
  redis_data: