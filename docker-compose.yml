version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: real_estate_db
    environment:
      POSTGRES_DB: real_estate_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: real_estate_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes

  # Celery Worker for async tasks
  celery_worker:
    build:
      context: .
      dockerfile: backend/Dockerfile.celery
    container_name: real_estate_celery_worker
    depends_on:
      - redis
      - database
    environment:
      - DJANGO_SETTINGS_MODULE=valuation_api.settings
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DATABASE_URL=postgresql://postgres:postgres123@database:5432/real_estate_db
      - ML_SERVICE_URL=http://172.17.0.1:8001
    volumes:
      - ./backend:/app:cached
    command: watchmedo auto-restart --directory=/app --pattern='*/tasks.py;*/celery.py;*/settings.py;*/models.py' --recursive -- celery -A valuation_api worker --loglevel=info
    restart: unless-stopped

  # Machine Learning Service
  ml-service:
    build:
      context: ./ml-service
    container_name: ml_service
    ports:
      - "8001:8001"
    volumes:
      - ./ml-service:/app:cached
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: always
    

volumes:
  postgres_data:
  redis_data: